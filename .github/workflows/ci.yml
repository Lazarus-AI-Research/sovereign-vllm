name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # Engine extra deliberately excluded: CI tests the appliance layer only.
      # Certified GPU and Metal gates run on the release-candidate hosts.
      - run: pip install -e '.[dev]'
      - run: ruff check lazarus tests
      - run: python -c "import lazarus.appliance"
      - run: pytest tests
